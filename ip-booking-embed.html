<!-- ImmoPixels Terminbuchung — beágyazás WordPress oldalra -->
<!-- Tedd ezt egy "Custom HTML" blokkba (Gutenberg) vagy egy HTML elembe (Elementor). -->

<div style="max-width:900px;margin:0 auto;">
  <iframe
    id="ip-booking-frame"
    src="https://immopixels-crm.vercel.app/buchen"
    style="width:100%;border:0;display:block;height:760px;overflow:hidden;"
    scrolling="no"
    title="Termin buchen"
    allow="geolocation"
    referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>

<script>
(function () {
  var frame = document.getElementById('ip-booking-frame');
  var current = 0;
  window.addEventListener('message', function (e) {
    if (e.origin !== 'https://immopixels-crm.vercel.app') return;
    if (e.data && e.data.type === 'ip-booking-height' && e.data.height) {
      var h = Math.round(e.data.height);
      // csak valódi változásnál méretezünk (megakadályozza a visszacsatolást)
      if (Math.abs(h - current) > 3) {
        current = h;
        frame.style.height = h + 'px';
      }
    }
  });
})();
</script>
